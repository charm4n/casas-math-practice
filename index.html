<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CASAS Math Practice & Self-Assessment</title>
  
  <!-- KaTeX CSS & JS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

  <!-- HUMAN ASSISTANCE REQUIRED: Paste your Google Analytics or Plausible <script> tag here -->
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="quiz-header">
      <h1>CASAS Math Skill Assessment</h1>
      <p>Test your ready-for-work math competency</p>
    </header>

    <!-- Mode Toggle -->
    <fieldset class="mode-toggle" aria-label="Quiz Mode Selection">
      <legend class="sr-only">Choose your study mode</legend>
      <label>
        <input type="radio" name="quizMode" value="practice" checked> 
        Practice Mode (Instant Feedback)
      </label>
      <label>
        <input type="radio" name="quizMode" value="test"> 
        Test Mode (Answers at the end)
      </label>
    </fieldset>

    <!-- Progress Bar -->
    <div class="progress-container" aria-label="Quiz Progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Quiz Card Container -->
    <main id="quizCard" class="card">
      <div class="question-header">
        <span id="questionCategory" class="badge">Category</span>
        <span id="questionCounter" aria-live="polite">Question 1 of 10</span>
      </div>

      <h2 id="questionText">Loading question...</h2>

      <div id="optionsContainer" class="options-grid" role="radiogroup" aria-label="Answer Options">
        <!-- Options injected dynamically -->
      </div>

      <!-- Instant Feedback Box (Hidden by default) -->
      <div id="instantFeedback" class="feedback-box hidden" aria-live="assertive"></div>

      <div class="card-footer">
        <button id="nextBtn" class="btn primary" disabled aria-disabled="true">Next Question</button>
      </div>
    </main>

    <!-- Results Panel -->
    <section id="resultsPanel" class="card hidden" aria-live="polite">
      <h2>Assessment Complete!</h2>
      
      <!-- High Contrast Score Visual -->
      <div class="score-visual-wrapper" aria-hidden="true">
        <div class="score-track">
          <div class="score-fill" id="scoreFillBar"></div>
        </div>
        <div class="score-badge" id="scoreDisplay">0%</div>
      </div>

      <!-- Past Scores Tracking -->
      <div class="past-scores">
        <h3>Your Past Scores</h3>
        <ul id="pastScoresList"></ul>
      </div>

      <div class="feedback-grid">
        <div class="feedback-block strengths">
          <h3>Strengths Demonstrated</h3>
          <ul id="strengthsList"></ul>
        </div>
        <div class="feedback-block improvements">
          <h3>Topics for Review</h3>
          <ul id="improvementsList"></ul>
        </div>
      </div>

      <div class="action-buttons">
        <button id="retryBtn" class="btn secondary">Retake Assessment</button>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
